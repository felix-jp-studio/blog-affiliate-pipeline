[project]
name = "blog-affiliate-generator"
version = "0.1.0"
requires-python = ">=3.11"

[project.scripts]
generate = "generator.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["generator*"]
