name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm test

      - name: Generator tests
        run: npm run test:generator

      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run format:check
          npm run build
