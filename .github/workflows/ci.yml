name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm test

      - name: Generator tests
        run: npm run test:generator

      - name: Validate article markdown
        run: node scripts/e2e/validate-articles.mjs

      - name: List changed article slugs (PR diff)
        if: github.event_name == 'pull_request'
        run: node scripts/e2e/changed-slugs.mjs

      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run format:check
          npm run build

      - name: Validate build output
        run: node scripts/e2e/validate-dist.mjs
