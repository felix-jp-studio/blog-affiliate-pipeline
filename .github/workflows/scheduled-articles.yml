name: Scheduled articles

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run even when not a scheduled day"
        type: boolean
        default: false
  schedule:
    # Mon-Sat 09:00 JST = UTC Mon-Sat 00:00 (6 articles/week, 1 per day, Sunday off)
    - cron: "0 0 * * 1-6"

jobs:
  publish-scheduled:
    runs-on: ubuntu-latest
    concurrency:
      group: scheduled-articles
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dry-run scheduled publish
        run: |
          BEFORE="$(git status --porcelain)"
          PYTHONPATH=packages/generator python3 -m generator publish-scheduled --dry-run --force
          AFTER="$(git status --porcelain)"
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "Dry-run modified working tree unexpectedly"
            git status --short
            exit 1
          fi

      - name: Check for open scheduled PR
        id: open_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh pr list --state open --json headRefName --jq '[.[] | select(.headRefName | startswith("scheduled/articles-"))] | length')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          if [ "${COUNT}" -gt 0 ]; then
            echo "Open scheduled PR exists; skipping generation unless forced."
          fi

      - name: Generate scheduled articles
        if: steps.open_pr.outputs.count == '0' || (github.event_name == 'workflow_dispatch' && inputs.force == true)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          npm run publish:scheduled -- $FORCE_FLAG

      - name: Skip message
        if: steps.open_pr.outputs.count != '0' && (github.event_name != 'workflow_dispatch' || inputs.force != true)
        run: echo "[SKIP] Open scheduled PR exists. Merge or close it before the next run."

      - name: Format
        if: success()
        run: npm run format

      - name: Validate
        if: success()
        run: |
          npm run format:check
          npm test
          npm run test:generator
          node scripts/e2e/validate-articles.mjs
          cd site && npm ci && npm run format:check && npm run build
          node ../scripts/e2e/validate-dist.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          BRANCH="scheduled/articles-${RUN_DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add site/src/content/articles state/publish-queue.json
          git commit -m "chore: scheduled articles ${RUN_DATE}"
          git push -u origin "$BRANCH"
          {
            echo "## Summary"
            echo "- 公開スケジュール（月〜土 09:00 JST・週6本 / 3タイプ×2）に従い記事を自動生成"
            echo "- タイプ均等配分（comparison / howto / troubleshoot をインターリーブ）"
            echo "- state/publish-queue.json を更新"
            echo ""
            echo "## Test plan"
            echo "- [ ] 生成記事の料金・リンク・AI 開示を目視確認"
            echo "- [ ] CI green を確認"
            echo "- [ ] マージ後 Vercel 本番反映を確認"
            echo ""
            echo "## Note"
            echo "自動 main マージは行いません。レビュー後にマージしてください。"
          } > /tmp/pr-body.md
          gh pr create \
            --title "chore: 定期記事生成 ${RUN_DATE}" \
            --body-file /tmp/pr-body.md

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Scheduled articles"
            echo ""
            echo "- changed: ${{ steps.changes.outputs.changed }}"
            echo "- schedule: Mon-Sat 09:00 JST (6/week = comparison×2 / howto×2 / troubleshoot×2)"
            echo "- docs: docs/article-publish-schedule.md"
          } >> "$GITHUB_STEP_SUMMARY"
