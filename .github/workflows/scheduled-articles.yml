name: Scheduled articles

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run even when not a scheduled day"
        type: boolean
        default: false
  schedule:
    # Sun-Sat 09:00 JST = UTC Sun-Sat 00:00 (7 articles/week: Mon-Sat types + Sun crosssell)
    - cron: "0 0 * * 0-6"

jobs:
  publish-scheduled:
    runs-on: ubuntu-latest
    concurrency:
      group: scheduled-articles
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dry-run scheduled publish
        run: |
          BEFORE="$(git status --porcelain)"
          PYTHONPATH=packages/generator python3 -m generator publish-scheduled --dry-run --force
          AFTER="$(git status --porcelain)"
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "Dry-run modified working tree unexpectedly"
            git status --short
            exit 1
          fi

      - name: Check for open scheduled PR
        id: open_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh pr list --state open --json headRefName --jq '[.[] | select(.headRefName | startswith("scheduled/articles-"))] | length')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          if [ "${COUNT}" -gt 0 ]; then
            echo "Open scheduled PR exists; skipping generation unless forced."
          fi

      - name: Generate scheduled articles
        if: steps.open_pr.outputs.count == '0' || (github.event_name == 'workflow_dispatch' && inputs.force == true)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          npm run publish:scheduled -- $FORCE_FLAG

      - name: Skip message
        if: steps.open_pr.outputs.count != '0' && (github.event_name != 'workflow_dispatch' || inputs.force != true)
        run: echo "[SKIP] Open scheduled PR exists. Merge or close it before the next run."

      - name: Format
        if: success()
        run: |
          npm run format
          cd site && npm ci && npm run format

      - name: Validate
        if: success()
        run: |
          npm run format:check
          npm test
          npm run test:generator
          node scripts/e2e/validate-articles.mjs
          cd site && npm ci && npm run format:check && npm run build
          node ../scripts/e2e/validate-dist.mjs

      - name: Check for article publish changes
        id: changes
        run: |
          CHANGED=$(git status --porcelain -- site/src/content/articles state/publish-queue.json)
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No article or publish-queue changes; skipping PR creation."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$CHANGED"
          fi

      - name: Install Playwright browsers
        if: success() && steps.changes.outputs.changed == 'true'
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Update Playwright visual snapshots
        if: success() && steps.changes.outputs.changed == 'true'
        working-directory: site
        env:
          CI: true
          PUBLIC_CONTACT_FORM_ACTION: ""
        run: |
          npm run test:e2e:visual:update
          npm run test:e2e:visual

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          BRANCH="scheduled/articles-${RUN_DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add site/src/content/articles state/publish-queue.json
          git add site/tests/visual/*-snapshots/
          if git diff --cached --quiet; then
            echo "No staged article changes; skipping PR creation."
            exit 0
          fi
          git commit -m "chore: scheduled articles ${RUN_DATE}"
          git push -u origin "$BRANCH"
          {
            echo "## Summary"
            echo "- 公開スケジュール（日〜土 09:00 JST・週7本 / 月〜土 3タイプ×2 + 日曜 crosssell）に従い記事を自動生成"
            echo "- 月〜土: タイプ均等配分（comparison / howto / troubleshoot をインターリーブ）"
            echo "- 日曜: data/keywords.sunday.csv から crosssell のみ"
            echo "- state/publish-queue.json を更新"
            echo "- Playwright visual/text スナップショットを CI (Ubuntu) で自動更新（主に /sim ハブ）"
            echo ""
            echo "## Test plan"
            echo "- [ ] 生成記事の料金・リンク・AI 開示を目視確認"
            echo "- [ ] playwright-visual CI green を確認"
            echo "- [ ] CI green を確認"
            echo "- [ ] マージ後 Vercel 本番反映を確認"
            echo ""
            echo "## Note"
            echo 'CI 通過後、`articles-auto-merge.yml` により自動 squash merge されます。'
          } > /tmp/pr-body.md
          gh pr create \
            --title "chore: 定期記事生成 ${RUN_DATE}" \
            --label "article-publish" \
            --body-file /tmp/pr-body.md

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Scheduled articles"
            echo ""
            echo "- changed: ${{ steps.changes.outputs.changed }}"
            echo "- visual snapshots: updated in CI (Ubuntu) when articles change /sim hub layout"
            echo "- schedule: Sun-Sat 09:00 JST (7/week = Mon-Sat comparison×2 / howto×2 / troubleshoot×2 + Sun crosssell)"
            echo "- docs: docs/article-publish-schedule.md"
          } >> "$GITHUB_STEP_SUMMARY"
