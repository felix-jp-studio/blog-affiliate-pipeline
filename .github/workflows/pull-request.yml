name: Pull Request

on:
  pull_request:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/e2e/post-visual-pr-comment.mjs"
      - ".github/workflows/pull-request.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright-visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Run Playwright visual regression
        id: visual
        working-directory: site
        continue-on-error: true
        run: npm run test:e2e:visual
        env:
          CI: true
          PUBLIC_CONTACT_FORM_ACTION: ""

      - name: Build visual regression PR comment
        if: github.event_name == 'pull_request'
        run: node scripts/e2e/post-visual-pr-comment.mjs
        env:
          VISUAL_REPORT_PATH: site/test-results/visual-report.json
          VISUAL_COMMENT_OUTPUT: site/test-results/visual-pr-comment.md
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Post visual regression comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: site/test-results/visual-pr-comment.md
          edit-mode: replace
          body-includes: "<!-- playwright-visual-report -->"

      - name: Visual regression summary
        if: steps.visual.outcome == 'failure'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Visual regression failed

          PR コメントの表と **playwright-visual-diff** artifact を確認してください。
          EOF

      - name: Upload visual diff artifacts
        if: steps.visual.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-diff
          path: |
            site/tests/visual/**/*-snapshots/**/*
            site/test-results/
          retention-days: 14

      - name: Fail job when visual regression failed
        if: steps.visual.outcome == 'failure'
        run: exit 1
