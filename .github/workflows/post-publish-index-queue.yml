name: Post-publish index queue

# 記事 PR が main にマージされたあと、GSC URL 検査用キューに slug を追記する。
# 正本: data/gsc-index-queue.json（手順: blog-affiliate-auto/docs/operations/gsc-index-queue.md）

on:
  push:
    branches: [main]
    paths:
      - "site/src/content/articles/**"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Comma-separated slugs (optional; default: diff from last push)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-index-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Append slugs to GSC index queue
        id: queue
        run: |
          if [ -n "${{ inputs.slugs }}" ]; then
            node scripts/append-index-queue.mjs --slugs="${{ inputs.slugs }}"
          else
            node scripts/append-index-queue.mjs --from-git
          fi

      - name: Commit queue update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gsc-index-queue.json
          if git diff --cached --quiet; then
            echo "No queue changes to commit."
            exit 0
          fi
          git commit -m "chore: update GSC index queue after article publish"
          git push

      - name: Upload queue artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsc-index-queue
          path: data/gsc-index-queue.json
          if-no-files-found: ignore

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Post-publish index queue"
            echo ""
            echo "- queue file: \`data/gsc-index-queue.json\`"
            echo "- manual ops: \`blog-affiliate-auto/docs/operations/gsc-index-queue.md\`"
            echo "- dispatch: re-run with \`slugs\` input to append specific slugs"
          } >> "$GITHUB_STEP_SUMMARY"
