name: Design docs auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    concurrency:
      group: design-docs-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check eligibility
        id: eligibility
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          FILES=$(gh pr diff "$PR_NUM" --name-only)

          if [ -z "$FILES" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "No changed files; skipping."
            exit 0
          fi

          DOCS_ONLY=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              docs/*) ;;
              *)
                DOCS_ONLY=false
                break
                ;;
            esac
          done <<< "$FILES"

          HAS_LABEL=$(
            gh pr view "$PR_NUM" --json labels --jq '[.labels[].name] | any(. == "design-doc")'
          )

          if [ "$DOCS_ONLY" = "true" ] || [ "$HAS_LABEL" = "true" ]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "Eligible for auto-merge (docs_only=${DOCS_ONLY}, design-doc=${HAS_LABEL})."
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Not eligible; changed files are outside docs/ and no design-doc label."
          fi

      - name: Setup Node
        if: steps.eligibility.outputs.eligible == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate docs formatting
        if: steps.eligibility.outputs.eligible == 'true'
        run: |
          npm ci
          npx prettier --check docs/

      - name: Enable auto-merge
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          gh pr merge "$PR_NUM" --auto --squash --delete-branch || \
            gh pr merge "$PR_NUM" --squash --delete-branch

      - name: Write job summary
        if: always() && steps.eligibility.outputs.eligible == 'true'
        run: |
          {
            echo "## Design docs auto-merge"
            echo ""
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Squash merge enabled (falls back to immediate merge when auto-merge is unavailable)."
          } >> "$GITHUB_STEP_SUMMARY"
